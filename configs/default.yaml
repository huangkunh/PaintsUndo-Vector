# PaintsUndo-Vector 默认配置
# 基于方案B的渐进式优化策略

# 画布设置
canvas:
  width: 640
  height: 480
  background_color: [1.0, 1.0, 1.0]  # 白色背景

# 设备设置
device: "cuda"  # "cuda" 或 "cpu"

# 阶段配置
stages:
  # Stage 1: 铺底色 - 模拟画家用大号画笔铺底色
  - name: "铺底色"
    num_strokes: 20
    max_width: 50.0
    min_width: 20.0
    num_control_points: 5
    resolution: [256, 256]
    num_iterations: 500
    lr: 1.0
    lr_width: 0.1
    lr_color: 0.01
    brush_names: ["marker", "watercolor", "airbrush"]
    lambda_pixel: 2.0
    lambda_perceptual: 5.0
    lambda_ssim: 0.5
    lambda_color: 2.0
    lambda_length: 0.01
    lambda_smooth: 0.005

  # Stage 2: 形体刻画 - 模拟画家勾勒轮廓和色块
  - name: "形体刻画"
    num_strokes: 100
    max_width: 15.0
    min_width: 5.0
    num_control_points: 7
    resolution: [512, 512]
    num_iterations: 800
    lr: 1.0
    lr_width: 0.1
    lr_color: 0.01
    brush_names: ["pressure", "pressure_sharp", "marker"]
    lambda_pixel: 1.0
    lambda_perceptual: 10.0
    lambda_ssim: 2.0
    lambda_color: 1.0
    lambda_length: 0.005
    lambda_smooth: 0.003

  # Stage 3: 细节线稿 - 模拟画家添加细节和纹理
  - name: "细节线稿"
    num_strokes: 300
    max_width: 3.0
    min_width: 1.0
    num_control_points: 9
    resolution: [1024, 1024]
    num_iterations: 1000
    lr: 0.5
    lr_width: 0.05
    lr_color: 0.005
    brush_names: ["pencil", "pressure_sharp", "hatching"]
    lambda_pixel: 0.5
    lambda_perceptual: 15.0
    lambda_ssim: 3.0
    lambda_color: 0.5
    lambda_length: 0.003
    lambda_smooth: 0.001

# 优化器设置
optimizer:
  type: "adam"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# 注意力引导设置
attention:
  enabled: true
  temperature: 1.0
  residual_weight: 0.4
  edge_weight: 0.3
  saliency_weight: 0.1
  color_weight: 0.2

# 人类绘画模拟设置
painting_sim:
  human_sort: true       # 按人类绘画习惯排序笔画
  rhythm_simulation: true # 模拟绘画节奏
  color_mixing: "over"   # 颜色混合模式: "over" | "multiply" | "average"

# 早停设置
early_stopping:
  patience: 50
  threshold: 0.001

# 导出设置
export:
  svg: true
  json: true
  html_player: true
  save_iterations: true
  iteration_save_interval: 50

# 回放设置
replay:
  stroke_duration: 0.5
  default_speed: 5
  show_narrative: true    # 显示绘画叙述
